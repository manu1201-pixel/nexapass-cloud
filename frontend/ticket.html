<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaPass | Access Granted</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0B0F17;
            --bg-card: #121824;
            --border: #1E293B;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --mint: #4ADE80;
            --mint-glow: rgba(74, 222, 128, 0.15);
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .ticket-wrapper {
            width: 100%;
            max-width: 480px;
            margin: 20px;
        }

        .ticket-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            position: relative;
        }

        .ticket-header {
            padding: 32px 32px 24px 32px;
            border-bottom: 1px dashed var(--border);
            position: relative;
        }

        .ticket-header::before, .ticket-header::after {
            content: '';
            position: absolute;
            bottom: -10px;
            width: 20px;
            height: 20px;
            background-color: var(--bg-main);
            border-radius: 50%;
            border: 1px solid var(--border);
            z-index: 2;
        }
        .ticket-header::before { left: -11px; }
        .ticket-header::after { right: -11px; }

        .pass-type {
            font-size: 11px;
            font-weight: 700;
            color: var(--mint);
            background-color: var(--mint-glow);
            padding: 4px 10px;
            border-radius: 6px;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 16px;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        .event-title {
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 6px 0;
            letter-spacing: -0.4px;
        }

        .ticket-body {
            padding: 24px 32px 32px 32px;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 32px;
        }

        .meta-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .meta-value {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .itinerary-box {
            background-color: #070A0F;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 32px;
        }

        .itinerary-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0 0 12px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .itinerary-title i {
            color: var(--mint);
        }

        .itinerary-text {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin: 0;
            white-space: pre-line;
        }

        .ticket-footer {
            background-color: #090D14;
            padding: 24px 32px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .barcode-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .mock-barcode {
            display: flex;
            gap: 2px;
            height: 36px;
            align-items: stretch;
        }

        .mock-barcode div {
            background-color: var(--text-primary);
            width: 2px;
        }
        .mock-barcode div.thick { width: 4px; }
        .mock-barcode div.thin { width: 1px; }
        .mock-barcode div.space { background-color: transparent; width: 3px; }

        .serial-text {
            font-family: monospace;
            font-size: 10px;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        .back-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 10px 18px;
            font-size: 13px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            color: var(--text-primary);
            border-color: var(--text-primary);
        }

        /* Real-time Gmail Delivery Status Strip */
        .email-status-panel {
            width: 100%;
            background-color: rgba(74, 222, 128, 0.05);
            border: 1px dashed rgba(74, 222, 128, 0.25);
            padding: 14px;
            border-radius: 12px;
            margin-top: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .email-status-text {
            font-size: 13px;
            color: var(--text-secondary);
            margin: 0;
        }

        .email-status-text strong {
            color: var(--mint);
        }
    </style>
</head>
<body>

    <div class="ticket-wrapper">
        <div class="ticket-card">
            
            <div class="ticket-header">
                <span class="pass-type">VIP Access Granted</span>
                <h1 class="event-title" id="ticket-event">Event Title</h1>
            </div>

            <div class="ticket-body">
                <div class="meta-grid">
                    <div>
                        <div class="meta-label">Verified Attendee</div>
                        <div class="meta-value" id="ticket-name">Loading...</div>
                    </div>
                    <div>
                        <div class="meta-label">Clearance ID</div>
                        <div class="meta-value" style="font-family: monospace;">NP-2026-88X7</div>
                    </div>
                </div>

                <div class="itinerary-box">
                    <div class="itinerary-title">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> AI Synced Agenda Flow
                    </div>
                    <p class="itinerary-text" id="ticket-itinerary">
                        Configuring customized scheduling arrays...
                    </p>
                </div>
            </div>

            <div class="ticket-footer">
                <div class="barcode-container">
                    <div class="mock-barcode">
                        <div class="thick"></div><div class="thin"></div><div class="space"></div>
                        <div></div><div class="thick"></div><div class="thin"></div>
                        <div class="space"></div><div class="thick"></div><div></div>
                        <div class="thin"></div><div class="thick"></div>
                    </div>
                    <span class="serial-text">SECURE_TOKEN//2026</span>
                </div>
                <a href="dashboard.html" class="back-btn">Exit Terminal</a>
            </div>

        </div>

        <div class="email-status-panel">
            <p class="email-status-text">
                <i class="fa-regular fa-envelope-open" style="color:var(--mint); margin-right:6px;"></i> 
                Pass generated! A secure copy has been routed straight to your **Gmail Inbox**.
            </p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Fill out our metadata strings cleanly from local cache blocks
            document.getElementById('ticket-name').innerText = localStorage.getItem('vip_name') || "Anonymous Attendee";
            document.getElementById('ticket-event').innerText = localStorage.getItem('vip_event') || "Main Track Access";
            document.getElementById('ticket-itinerary').innerText = localStorage.getItem('vip_itinerary') || "No itinerary parsed.";
        });
    </script>
</body>
</html>
