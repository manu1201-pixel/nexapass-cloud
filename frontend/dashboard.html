<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaPass | Discover</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0B0F17;         /* The ultra-dark dashboard background */
            --bg-card: #121824;         /* The slightly lighter slate card color */
            --border: #1E293B;          /* Subtle charcoal grid borders */
            --text-primary: #F8FAFC;    /* Off-white readable text */
            --text-secondary: #94A3B8;  /* Muted grey support text */
            --mint: #4ADE80;            /* Your active mint green brand accent */
            --mint-glow: rgba(74, 222, 128, 0.15);
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin: 0;
        }

        .location-status {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            background: #162032;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #2A3B56;
        }

        .location-status i {
            font-size: 8px;
            color: var(--mint);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        .event-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* The Cards matching the "UnifyData" UI block format */
        .event-row {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            padding: 28px;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: border-color 0.2s ease, transform 0.2s ease;
            cursor: pointer;
        }

        .event-row:hover {
            border-color: var(--mint);
            transform: translateY(-2px);
        }

        .event-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .status-tag {
            font-size: 11px;
            font-weight: 600;
            background-color: var(--mint-glow);
            color: var(--mint);
            padding: 3px 10px;
            border-radius: 6px;
            border: 1px solid rgba(74, 222, 128, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .distance-metric {
            font-size: 13px;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
        }

        .event-title {
            font-size: 18px;
            font-weight: 500;
            margin: 0 0 8px 0;
            letter-spacing: -0.3px;
            color: #ffffff;
        }

        .event-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin: 0 0 16px 0;
            max-width: 620px;
            line-height: 1.6;
        }

        .event-venue {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .event-venue i {
            color: var(--mint);
        }

        /* Gradient Mint Button */
        .action-button {
            background: linear-gradient(135deg, #4ADE80 0%, #22C55E 100%);
            color: #052E16;
            border: none;
            padding: 12px 24px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(74, 222, 128, 0.2);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .action-button:hover {
            opacity: 0.95;
            transform: scale(1.02);
        }

        #status-message {
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>Discover Hub</h1>
                <p style="margin: 5px 0 0 0; font-size: 12px; color: var(--text-secondary);">Connected Engines: MongoDB Atlas × Gemini AI</p>
            </div>
            <div style="display: flex; align-items: center; gap: 12px;">
                <button id="sync-btn" style="background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border); padding: 8px 16px; border-radius: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: border-color 0.2s;">
                    <i class="fa-solid fa-arrows-rotate" id="sync-icon"></i> Sync Unstop
                </button>
                <div class="location-status" id="location-indicator">
                    <i class="fa-solid fa-circle"></i> Tracking Location
                </div>
            </div>
        </div>

        <div id="event-container" class="event-list">
            </div>

        <div id="status-message">Connecting local geospatial engine...</div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
