<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaPass | Secure Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0B0F17;
            --bg-card: #121824;
            --border: #1E293B;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --mint: #4ADE80;
            --mint-glow: rgba(74, 222, 128, 0.1);
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .form-container {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin: 20px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            margin-bottom: 32px;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--mint);
        }

        h2 {
            font-size: 22px;
            font-weight: 600;
            margin: 0 0 8px 0;
            letter-spacing: -0.4px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin: 0 0 32px 0;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }

        label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            background-color: #070A0F;
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 14px 16px;
            font-size: 14px;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input[type="text"]:focus {
            border-color: var(--mint);
            box-shadow: 0 0 0 1px var(--mint-glow);
        }

        /* Read-only tracking event banner */
        .selected-event-badge {
            background-color: #162032;
            border: 1px solid #2A3B56;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--mint);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .submit-button {
            width: 100%;
            background: linear-gradient(135deg, #4ADE80 0%, #22C55E 100%);
            color: #052E16;
            border: none;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 12px;
            box-shadow: 0 4px 12px rgba(74, 222, 128, 0.15);
            transition: opacity 0.2s ease, transform 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .submit-button:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }

        .loading-spinner {
            display: none;
            font-size: 14px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <a href="dashboard.html" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> Back to Hub
        </a>
        
        <h2>Secure Credentials</h2>
        <p class="subtitle">Complete deployment registration credentials.</p>

        <form id="registration-form">
            <div class="input-group">
                <label>Target Event Index</label>
                <div id="event-display" class="selected-event-badge">
                    <i class="fa-solid fa-shield-halved"></i> Loading parameters...
                </div>
            </div>

            <div class="input-group">
                <label>Attendee Name</label>
                <input type="text" id="username" placeholder="Enter full name" required autocomplete="off">
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="text" id="user-email" placeholder="name@example.com" required autocomplete="off">
            </div>

            <button type="submit" class="submit-button" id="submit-btn">
                <span>Generate Pass Parameters</span>
                <i class="fa-solid fa-spinner loading-spinner" id="spinner"></i>
            </button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
